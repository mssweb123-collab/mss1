<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="../assets/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="shortcut icon" href="../assets/favicon.ico" />
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png" />
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Manage Transport – MSS School</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body {
      background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%);
      min-height: 100vh;
    }
    
    .header-bar {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--glass-shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-bar h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: 1.4rem;
      color: var(--primary-dark);
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .back-btn {
      background: var(--white);
      border: 1px solid var(--border-color);
      color: var(--primary-dark);
      padding: 0.55rem 1.2rem;
      border-radius: var(--radius-full);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
    }

    .back-btn:hover {
      background: var(--primary);
      color: var(--white);
      border-color: var(--primary);
      transform: translateX(-3px);
    }

    .container-content {
      padding: 2rem 1rem;
      max-width: 760px;
      margin: 0 auto;
      display: grid;
      gap: 1.5rem;
    }

    .control-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 1.5rem;
      box-shadow: var(--glass-shadow);
    }

    .student-transport-card {
      background: var(--white);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      box-shadow: var(--shadow-sm);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.5rem;
      transition: var(--transition);
    }

    .student-transport-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .student-info {
      flex: 1;
    }

    .student-name {
      font-weight: 700;
      color: var(--primary-dark);
      font-size: 1.1rem;
    }

    .student-roll {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-top: 2px;
    }

    .transport-controls {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .custom-select {
      padding: 0.6rem 1rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
      background-color: var(--white);
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: var(--transition);
      font-weight: 600;
      color: var(--text-primary);
    }

    .custom-select:focus {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
    }

    .badge-icon {
      padding: 0.5rem;
      border-radius: var(--radius-full);
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
    }

    .badge-bus {
      background: rgba(245, 158, 11, 0.1);
      color: #d97706;
    }

    .badge-walk {
      background: rgba(16, 185, 129, 0.1);
      color: #059669;
    }

    @media (max-width: 580px) {
      .student-transport-card {
        flex-direction: column;
        align-items: stretch;
        gap: 1rem;
      }
      .transport-controls {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }
      .custom-select {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
<script src="../js/supabase.js"></script>
  <script src="../js/app.js"></script>
  <script>
    const session = Auth.requireRole('teacher', 'teacher-login.html');
  </script>

  <header class="header-bar">
    <h1><i class="bi bi-bus-front-fill icon-accent"></i> Manage Transport</h1>
    <button class="back-btn" onclick="window.location.href='teacher-dashboard.html'">
      <i class="bi bi-arrow-left"></i> Dashboard
    </button>
  </header>

  <main class="container-content page-enter">
    <!-- Class Selector Card for Teachers managing multiple classes -->
    <div class="control-card" id="classSelectorCard" style="display: none; margin-bottom: 0.25rem;">
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" style="font-size: 0.85rem; font-weight: 750;"><i class="bi bi-mortarboard-fill"></i> Select Class to Manage Transport</label>
        <select id="classSelectDropdown" class="form-control" onchange="switchClass(this.value)" style="margin-bottom:0; font-weight:700; color:var(--primary-dark);"></select>
      </div>
    </div>
    <div class="control-card">
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" style="font-size: 0.85rem;"><i class="bi bi-search"></i> Find Student</label>
        <input type="text" id="searchBar" class="form-control" placeholder="Type name to search..." oninput="filterStudents()"/>
      </div>
    </div>

    <div class="student-list" id="transportList"></div>
  </main>

  <div id="toast-container"></div>

  <script>
    let myClassId = null;
    let myClassIds = [];
    let students = [];
    let buses = [];

    if (session) {
      const teachers = DB.get('teachers') || [];
      const teacher = teachers.find(t => t.id === session.id);
      if (teacher) {
        myClassIds = Array.isArray(teacher.classId) ? teacher.classId : (teacher.classId ? [teacher.classId] : []);
        myClassId = myClassIds[0] || null;
        
        if (myClassIds.length > 1) {
          const classes = DB.get('classes') || [];
          const selector = document.getElementById('classSelectDropdown');
          selector.innerHTML = classes.filter(c => myClassIds.includes(c.id)).map(c => `<option value="${c.id}">${c.name}</option>`).join('');
          document.getElementById('classSelectorCard').style.display = 'block';
        }
      }
      buses = DB.get('buses') || [];
      
      loadTransport();

      // Listen to database sync
      window.addEventListener('mss-db-sync', loadTransport);
    }

    function getMyStudents() {
      const allStudents = DB.get('students') || [];
      return allStudents.filter(s => s.classId === myClassId);
    }

    function loadTransport() {
      students = getMyStudents();
      renderTransportList();
    }

    function renderTransportList() {
      const list = document.getElementById('transportList');
      if (students.length === 0) {
        list.innerHTML = "<div class='text-center p-4'><p class='text-muted'>No students found in your class.</p></div>";
        return;
      }

      const searchQuery = document.getElementById('searchBar').value.toLowerCase().trim();
      const filtered = students.filter(s => s.name.toLowerCase().includes(searchQuery));

      if (filtered.length === 0) {
        list.innerHTML = "<div class='text-center p-4'><p class='text-muted'>No matching students found.</p></div>";
        return;
      }

      list.innerHTML = filtered.map(s => {
        const isBus = s.type === 'bus';
        return `
          <div class="student-transport-card">
            <div style="display: flex; align-items: center; gap: 1rem;">
              <div class="badge-icon ${isBus ? 'badge-bus' : 'badge-walk'}">
                <i class="bi ${isBus ? 'bi-bus-front' : 'bi-person-walking'}"></i>
              </div>
              <div class="student-info">
                <div class="student-name">${s.name}</div>
                <div class="student-roll">Roll No: ${s.rollNo}</div>
              </div>
            </div>
            <div class="transport-controls">
              <select class="custom-select" onchange="updateTransport('${s.id}', this.value)">
                <option value="dayscholar" ${!isBus ? 'selected' : ''}>🚶‍♂️ Day Scholar</option>
                <option value="bus" ${isBus ? 'selected' : ''}>🚌 Bus Student</option>
              </select>
              <select class="custom-select" id="bus_select_${s.id}" onchange="updateBus('${s.id}', this.value)" style="display: ${isBus ? 'block' : 'none'}">
                <option value="">Select Bus Route</option>
                ${buses.map(b => `<option value="${b.id}" ${s.busId === b.id ? 'selected' : ''}>${b.number}</option>`).join('')}
              </select>
            </div>
          </div>
        `;
      }).join('');
    }

    function updateTransport(studentId, type) {
      const allStudents = DB.get('students') || [];
      const student = allStudents.find(s => s.id === studentId);
      if (student) {
        student.type = type;
        if (type === 'dayscholar') student.busId = null;
        DB.set('students', allStudents).then(() => {
          // Show/hide sub-selector
          const busSel = document.getElementById(`bus_select_${studentId}`);
          if (busSel) {
            busSel.style.display = type === 'bus' ? 'block' : 'none';
          }
          
          // Dynamic re-render card icon styling
          loadTransport();
          showToast('Transport mode updated', 'success');
        });
      }
    }

    function updateBus(studentId, busId) {
      const allStudents = DB.get('students') || [];
      const student = allStudents.find(s => s.id === studentId);
      if (student && student.type === 'bus') {
        student.busId = busId;
        DB.set('students', allStudents).then(() => {
          showToast('Bus assigned', 'success');
        });
      }
    }

    window.switchClass = function(classId) {
      myClassId = classId;
      loadTransport();
    };

    function filterStudents() {
      renderTransportList();
    }
  </script>
</body>
</html>
