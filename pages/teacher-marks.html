<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="../assets/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="shortcut icon" href="../assets/favicon.ico" />
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png" />
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Enter Marks – MSS School</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body {
      background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%);
      min-height: 100vh;
      padding-bottom: 5rem; /* Space for floating save button */
    }
    
    .header-bar {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--glass-shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-bar h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: 1.4rem;
      color: var(--primary-dark);
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .back-btn {
      background: var(--white);
      border: 1px solid var(--border-color);
      color: var(--primary-dark);
      padding: 0.55rem 1.2rem;
      border-radius: var(--radius-full);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
    }

    .back-btn:hover {
      background: var(--primary);
      color: var(--white);
      border-color: var(--primary);
      transform: translateX(-3px);
    }

    .container-content {
      padding: 2rem 1rem;
      max-width: 800px;
      margin: 0 auto;
      display: grid;
      gap: 1.5rem;
    }

    .control-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 1.5rem;
      box-shadow: var(--glass-shadow);
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .exam-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .exam-tab-btn {
      flex: 1;
      min-width: 90px;
      padding: 0.65rem 1rem;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-full);
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
      white-space: nowrap;
    }

    .exam-tab-btn:hover {
      border-color: var(--primary-light);
      color: var(--primary);
    }

    .exam-tab-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-color: transparent;
      color: var(--white);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
    }

    .student-mark-card {
      background: var(--white);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 1.5rem;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: var(--transition);
    }

    .student-mark-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .student-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.75rem;
    }

    .student-name {
      font-weight: 800;
      color: var(--primary-dark);
      font-size: 1.15rem;
    }

    .student-roll {
      font-size: 0.85rem;
      color: var(--text-secondary);
      background: var(--bg-main);
      padding: 0.2rem 0.6rem;
      border-radius: var(--radius-sm);
      font-weight: 600;
    }

    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 1rem;
    }

    .subject-input-box {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      background: var(--bg-main);
      padding: 0.75rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
    }

    .subject-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .mark-input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 1.1rem;
      font-weight: 800;
      text-align: center;
      color: var(--primary-dark);
      outline: none;
      transition: var(--transition);
    }

    .mark-input:focus {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
      background: var(--white);
    }

    /* Floating Save Bar */
    .save-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border-color);
      padding: 1rem;
      display: flex;
      justify-content: center;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06);
      z-index: 90;
    }

    .save-all-btn {
      width: 100%;
      max-width: 480px;
      padding: 0.85rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      border: none;
      border-radius: var(--radius-full);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3);
      transition: var(--transition);
    }

    .save-all-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
    }

    .save-all-btn:active {
      transform: translateY(0);
    }

    @media (max-width: 580px) {
      .header-bar {
        padding: 1rem 1.25rem;
      }
      .header-bar h1 {
        font-size: 1.15rem;
        gap: 0.4rem;
      }
      .back-btn span {
        display: none;
      }
      .back-btn {
        padding: 0.55rem;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .container-content {
        padding: 1.25rem 1rem;
        gap: 1.25rem;
      }
      .control-card {
        padding: 1.25rem;
      }
      .student-mark-card {
        padding: 1.25rem 1rem;
      }
      .subjects-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
      }
      .save-bar {
        padding: 0.75rem 1rem;
      }
      .save-all-btn {
        padding: 0.75rem;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
<script src="../js/supabase.js"></script>
  <script src="../js/app.js"></script>
  <script>
    const session = Auth.requireRole('teacher', 'teacher-login.html');
  </script>

  <header class="header-bar">
    <h1><i class="bi bi-journal-check icon-accent"></i> Enter Marks</h1>
    <button class="back-btn" onclick="window.location.href='teacher-dashboard.html'">
      <i class="bi bi-arrow-left"></i> <span>Dashboard</span>
    </button>
  </header>

  <main class="container-content page-enter">
    <!-- Class Selector Card for Teachers managing multiple classes -->
    <div class="control-card" id="classSelectorCard" style="display: none; margin-bottom: 0.25rem;">
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" style="font-size: 0.85rem; font-weight: 750;"><i class="bi bi-mortarboard-fill"></i> Select Class to Enter Marks</label>
        <select id="classSelectDropdown" class="form-control" onchange="switchClass(this.value)" style="margin-bottom:0; font-weight:700; color:var(--primary-dark);"></select>
      </div>
    </div>
    <div class="control-card">
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" style="font-size: 0.85rem;"><i class="bi bi-search"></i> Search Student</label>
        <input type="text" id="searchBar" class="form-control" placeholder="Search by name..." oninput="filterStudents()"/>
      </div>
      <div>
        <label class="form-label" style="font-size: 0.85rem; margin-bottom: 0.5rem;"><i class="bi bi-award"></i> Select Examination</label>
        <div class="exam-tabs">
          <button class="exam-tab-btn active" data-exam="exam1" onclick="switchExam(this)">Quarterly</button>
          <button class="exam-tab-btn" data-exam="exam2" onclick="switchExam(this)">Half Yearly</button>
          <button class="exam-tab-btn" data-exam="exam3" onclick="switchExam(this)">Annual</button>
        </div>
      </div>
    </div>

    <div class="student-list" id="marksList"></div>
  </main>

  <div class="save-bar">
    <button class="save-all-btn" onclick="saveAllMarks()">
      <i class="bi bi-cloud-upload"></i> Save Marks
    </button>
  </div>

  <div id="toast-container"></div>

  <script>
    let myClassId = null;
    let myClassIds = [];
    let mySubjects = [];
    let students = [];
    let selectedExam = 'exam1';

    function initTeacherSession() {
      const teachers = DB.get('teachers') || [];
      const teacher = teachers.find(t => t.id === session.id);
      if (!teacher) return false;

      myClassIds = Array.isArray(teacher.classId) ? teacher.classId : (teacher.classId ? [teacher.classId] : []);
      if (!myClassId) {
        myClassId = myClassIds[0] || null;
      }
      mySubjects = (DB.get('subjects') || {})[myClassId] || [];
      
      if (myClassIds.length > 1) {
        const classes = DB.get('classes') || [];
        const selector = document.getElementById('classSelectDropdown');
        if (selector && selector.children.length <= 1) {
          selector.innerHTML = classes.filter(c => myClassIds.includes(c.id)).map(c => `<option value="${c.id}">${c.name}</option>`).join('');
          const card = document.getElementById('classSelectorCard');
          if (card) card.style.display = 'block';
        }
      }
      return true;
    }

    if (session) {
      const initialized = initTeacherSession();
      if (initialized) {
        loadMarks();
      }

      // Listen to database sync
      window.addEventListener('mss-db-sync', () => {
        initTeacherSession();
        loadMarks();
      });
    }

    function getMyStudents() {
      const allStudents = DB.get('students') || [];
      const activeYear = currentAcademicYear();
      return allStudents.filter(s => 
        s.classId === myClassId && 
        (!activeYear || (s.academicYear || s.academic_year) === activeYear)
      );
    }

    function switchExam(btn) {
      document.querySelectorAll('.exam-tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedExam = btn.dataset.exam;
      loadMarks();
    }

    function loadMarks() {
      students = getMyStudents();
      renderMarksList();
    }

    function renderMarksList() {
      const list = document.getElementById('marksList');
      if (students.length === 0) {
        list.innerHTML = "<div class='text-center p-4'><p class='text-muted'>No students found in your class.</p></div>";
        return;
      }

      const searchQuery = document.getElementById('searchBar').value.toLowerCase().trim();
      const filtered = students.filter(s =>
        s.name.toLowerCase().includes(searchQuery) ||
        (s.rollNo || '').toLowerCase().includes(searchQuery)
      );
      const allMarks = DB.get('marks') || {};

      if (filtered.length === 0) {
        list.innerHTML = "<div class='text-center p-4'><p class='text-muted'>No matching students found.</p></div>";
        return;
      }

      const maxMarksObj = DB.get('subjectMaxMarks') || {};

      // Compute class-wide totals for ranking
      const classTotals = students.map(s => {
        const sm = allMarks[s.id] || {};
        const classSubjects = (DB.get('subjects') || {})[s.classId] || [];
        let total = 0;
        classSubjects.forEach(sub => {
          const val = sm[sub] && sm[sub][selectedExam];
          if (typeof val === 'number') total += val;
        });
        return { id: s.id, total };
      }).sort((a, b) => b.total - a.total);
      const getRank = (studentId) => {
        const idx = classTotals.findIndex(x => x.id === studentId);
        return idx >= 0 ? idx + 1 : '-';
      };

      list.innerHTML = filtered.map(s => {
        const smarks = allMarks[s.id] || {};
        const classMaxMarks = maxMarksObj[s.classId] || {};
        
        const classSubjects = (DB.get('subjects') || {})[s.classId] || [];
        let studentTotal = 0;
        let maxTotal = 0;
        const inputs = classSubjects.map(sub => {
          const val = smarks[sub] && smarks[sub][selectedExam] !== undefined ? smarks[sub][selectedExam] : '';
          const maxMark = classMaxMarks[sub] !== undefined ? classMaxMarks[sub] : 100;
          if (typeof val === 'number') studentTotal += val;
          maxTotal += maxMark;
          return `
            <div class="subject-input-box">
              <span class="subject-label">${sub} <span style="font-size:0.75rem; color:var(--text-secondary); text-transform:none;">(Max: ${maxMark})</span></span>
              <input type="number" min="0" max="${maxMark}" class="mark-input" data-student="${s.id}" data-subject="${sub}" data-max="${maxMark}" value="${val}" placeholder="-">
            </div>
          `;
        }).join('');

        const rank = getRank(s.id);
        const pct = maxTotal > 0 && studentTotal > 0 ? Math.round((studentTotal / maxTotal) * 100) : null;
        const rankColor = rank === 1 ? '#f59e0b' : rank === 2 ? '#94a3b8' : rank === 3 ? '#d97706' : 'var(--primary)';
        
        return `
          <div class="student-mark-card">
            <div class="student-header">
              <span class="student-name">${s.name}</span>
              <div style="display:flex; gap:0.5rem; align-items:center;">
                <span class="student-roll">Roll No: ${s.rollNo}</span>
                ${rank !== '-' ? `<span style="background:rgba(79,70,229,0.08); color:${rankColor}; padding:0.2rem 0.55rem; border-radius:99px; font-size:0.75rem; font-weight:800;">Rank #${rank}</span>` : ''}
              </div>
            </div>
            <div class="subjects-grid">
              ${inputs}
              <div class="subject-input-box" style="border: 1.5px solid rgba(79,70,229,0.2); background: rgba(79,70,229,0.04);">
                <span class="subject-label" style="color: var(--primary);">Total</span>
                <div style="font-size:1.1rem; font-weight:800; text-align:center; color:var(--primary-dark); padding: 0.5rem;">
                  ${studentTotal > 0 ? `${studentTotal}<span style="font-size:0.7rem; color:var(--text-secondary); font-weight:600;"> / ${maxTotal}</span>` : '<span style="color:var(--text-muted)">—</span>'}
                  ${pct !== null ? `<div style="font-size:0.72rem; color:var(--success); font-weight:700;">${pct}%</div>` : ''}
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function saveAllMarks() {
      const allMarks = DB.get('marks') || {};
      let hasUnsavedValidations = false;
      
      document.querySelectorAll('.mark-input').forEach(inp => {
        const sid = inp.dataset.student;
        const sub = inp.dataset.subject;
        const maxMark = parseInt(inp.dataset.max || '100', 10);
        const val = inp.value.trim();
        
        if (val !== '') {
          const markInt = parseInt(val, 10);
          if (isNaN(markInt) || markInt < 0 || markInt > maxMark) {
            hasUnsavedValidations = true;
            inp.style.borderColor = 'var(--danger)';
          } else {
            if (!allMarks[sid]) allMarks[sid] = {};
            if (!allMarks[sid][sub]) allMarks[sid][sub] = {};
            allMarks[sid][sub][selectedExam] = markInt;
            inp.style.borderColor = 'var(--border-color)';
          }
        } else {
          // Clear mark if it was emptied
          if (allMarks[sid] && allMarks[sid][sub]) {
            delete allMarks[sid][sub][selectedExam];
          }
        }
      });
      
      if (hasUnsavedValidations) {
        showToast("Please correct the marks (must be between 0 and the subject's max mark)", 'error');
        return;
      }

      DB.set('marks', allMarks).then(() => {
        showToast('Marks saved successfully', 'success');
      });
    }

    window.switchClass = function(classId) {
      myClassId = classId;
      mySubjects = (DB.get('subjects') || {})[myClassId] || [];
      loadMarks();
    };

    function filterStudents() {
      renderMarksList();
    }
  </script>
</body>
</html>
